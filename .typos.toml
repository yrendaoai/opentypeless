[default.extend-words]
# Allow these "words" that typos might flag
cpal = "cpal"
stt = "stt"
llm = "llm"
byok = "byok"
hotkey = "hotkey"

[files]
extend-exclude = [
  "*.lock",
  "node_modules/",
  "target/",
  "dist/",
  "*.min.js",
  "*.min.css",
  "CHANGELOG.md",
  "README_ar.md",
  "README_de.md",
  "README_es.md",
  "README_fr.md",
  "README_hi.md",
  "README_id.md",
  "README_it.md",
  "README_ja.md",
  "README_ko.md",
  "README_nl.md",
  "README_pl.md",
  "README_pt.md",
  "README_ru.md",
  "README_th.md",
  "README_tr.md",
  "README_vi.md",
  "README_zh.md",
]

[default.extend-identifiers]
